<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cart Inventory — Device Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17191C; --ink-soft:#565B61; --paper:#E9EAE4; --card:#FFFFFF;
    --line:#D8D9D1; --line-soft:#E7E8E1;
    --amber:#F4A900; --amber-deep:#B97F00; --amber-ink:#1A1400;
    --slate:#1E3A45; --slate-soft:#2C4E5C;
    --flag:#C0392B; --flag-bg:#FBEDEB;
    --ok:#2E6B45;
    --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    --ui:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--ui); color:var(--ink); background:var(--paper);
    -webkit-font-smoothing:antialiased; line-height:1.45;
    padding:env(safe-area-inset-top) 0 0;
  }
  .wrap{max-width:560px;margin:0 auto;padding:14px 16px 56px}

  /* brand bar */
  .brand{display:flex;align-items:center;gap:10px;padding:6px 2px 14px}
  .brand .mark{
    width:30px;height:30px;border-radius:6px;background:var(--slate);
    display:grid;place-items:center;flex:none;
  }
  .brand .mark span{
    width:14px;height:14px;border:2.5px solid var(--amber);border-radius:3px;
  }
  .brand b{font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:12.5px}
  .brand small{color:var(--ink-soft);letter-spacing:.14em;text-transform:uppercase;font-size:11px}
  .brand .sep{color:var(--line);font-weight:700}

  /* scanned status line */
  .scanline{
    font-family:var(--mono);font-size:12px;color:var(--ink-soft);
    display:flex;align-items:center;gap:8px;margin:2px 2px 12px;
    border-top:1px solid var(--line);padding-top:12px;
  }
  .scanline .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex:none;
    box-shadow:0 0 0 3px rgba(244,169,0,.22)}
  .scanline b{color:var(--ink);font-weight:700}

  /* ROOM HERO */
  .hero{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    overflow:hidden;box-shadow:0 1px 0 rgba(0,0,0,.03),0 14px 30px -22px rgba(0,0,0,.35);
  }
  .hero .eyebrow{
    font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;
    color:var(--ink-soft);padding:16px 18px 0;
  }
  .roomblock{display:flex;align-items:stretch;gap:0;padding:10px 16px 18px}
  .roomstamp{
    background:var(--amber);color:var(--amber-ink);
    border:2px solid var(--amber-deep);border-radius:14px;
    padding:6px 20px 10px;min-width:132px;text-align:center;
    box-shadow:inset 0 -4px 0 rgba(0,0,0,.10);
    transform-origin:center;
  }
  .roomstamp .lab{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;font-weight:800;opacity:.7;padding-top:4px}
  .roomstamp .num{font-weight:900;font-size:72px;line-height:.92;letter-spacing:-.02em;font-feature-settings:"tnum"}
  .roommeta{padding:8px 4px 4px 18px;display:flex;flex-direction:column;justify-content:center}
  .roommeta .who{font-weight:800;font-size:24px;line-height:1.05}
  .roommeta .sub{color:var(--ink-soft);font-size:13px;margin-top:4px}

  @keyframes stamp{0%{transform:scale(.86) rotate(-1.5deg);opacity:0}
    60%{transform:scale(1.03) rotate(.4deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  .animate .roomstamp{animation:stamp .42s cubic-bezier(.2,.8,.2,1) both}

  /* DEVICE PANEL — styled like the physical property tag */
  .panel{
    margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:0 1px 0 rgba(0,0,0,.03),0 14px 30px -24px rgba(0,0,0,.3);overflow:hidden;
  }
  .panel .phead{
    display:flex;justify-content:space-between;align-items:center;
    padding:13px 16px;border-bottom:1px dashed var(--line);
    font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);
  }
  .typepill{
    font-family:var(--ui);font-weight:800;letter-spacing:.04em;text-transform:none;
    font-size:12px;color:var(--slate);background:#EAF1F3;border:1px solid #CFE0E5;
    padding:3px 10px;border-radius:999px;
  }
  .tagzone{padding:6px 16px 16px}
  .barcode{height:34px;margin:8px 0 6px;border-radius:3px;
    background-image:repeating-linear-gradient(90deg,var(--ink) 0 2px,transparent 2px 4px,var(--ink) 4px 5px,transparent 5px 9px,var(--ink) 9px 12px,transparent 12px 13px,var(--ink) 13px 15px,transparent 15px 18px);
    opacity:.82}
  .asset{
    font-family:var(--mono);font-weight:700;font-size:clamp(20px,6.4vw,28px);
    letter-spacing:.01em;word-break:break-all;color:var(--ink);
  }
  .asset .ast{color:var(--amber-deep)}
  .rows{margin-top:14px;border-top:1px solid var(--line-soft)}
  .row{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
  .row .k{flex:none;width:96px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;padding-top:3px}
  .row .v{font-family:var(--mono);font-size:14px;word-break:break-all;color:var(--ink)}
  .row .v.empty{font-family:var(--ui);color:var(--ink-soft);font-style:italic}

  /* conflict / not-found notices */
  .notice{border-radius:14px;padding:14px 16px;margin-top:14px;font-size:14px}
  .notice.flag{background:var(--flag-bg);border:1px solid #EBC4BE;color:#7A2117}
  .notice.flag b{color:var(--flag)}
  .notice .rooms{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .roomchip{font-family:var(--mono);font-weight:700;background:#fff;border:1px solid #E0B7B0;
    color:#7A2117;padding:6px 12px;border-radius:8px;font-size:15px}

  .empty{
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:30px 20px;text-align:center;
  }
  .empty .big{font-weight:900;font-size:22px}
  .empty .scanned{font-family:var(--mono);margin-top:8px;color:var(--ink-soft);word-break:break-all;font-size:13px}
  .empty p{color:var(--ink-soft);margin:10px 0 0;font-size:14px}

  /* search */
  .search{margin-top:18px}
  .search .lbl{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin:0 2px 7px}
  .sbar{display:flex;gap:8px}
  .sbar input{
    flex:1;font-family:var(--mono);font-size:15px;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:13px 14px;min-width:0;
  }
  .sbar input:focus{outline:none;border-color:var(--slate);box-shadow:0 0 0 3px rgba(30,58,69,.12)}
  .sbar button{
    flex:none;font-family:var(--ui);font-weight:800;font-size:14px;color:#fff;
    background:var(--slate);border:0;border-radius:11px;padding:0 18px;cursor:pointer;letter-spacing:.02em;
  }
  .sbar button:active{transform:translateY(1px)}
  .hint{font-size:12px;color:var(--ink-soft);margin:8px 2px 0}

  /* search results list */
  .results{margin-top:14px}
  .reshead{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--ink-soft);margin:0 2px 8px}
  .item{
    display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;
    cursor:pointer;text-align:left;width:100%;font:inherit;color:inherit;
  }
  .item:active{background:#FBFBF8}
  .item .rm{flex:none;width:50px;height:46px;border-radius:9px;background:var(--amber);
    color:var(--amber-ink);font-weight:900;display:grid;place-items:center;font-size:19px;
    border:1.5px solid var(--amber-deep)}
  .item .meta{min-width:0}
  .item .meta .a{font-family:var(--mono);font-weight:700;font-size:13.5px;word-break:break-all}
  .item .meta .s{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .item.conf .rm{background:var(--flag-bg);color:var(--flag);border-color:#E0B7B0}

  /* footer */
  .foot{margin-top:26px;padding-top:14px;border-top:1px solid var(--line);
    display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center;
    font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
  .foot .src{display:flex;align-items:center;gap:6px}
  .foot .src .d{width:7px;height:7px;border-radius:50%;background:var(--ink-soft)}
  .foot .src.live .d{background:var(--ok)}
  .foot a{color:var(--slate);text-decoration:none;border-bottom:1px solid var(--line)}

  .hidden{display:none !important}

  @media (max-width:420px){
    .roomstamp{min-width:118px;padding:6px 14px 10px}
    .roomstamp .num{font-size:62px}
    .roommeta .who{font-size:21px}
  }
  @media (prefers-reduced-motion:reduce){
    .animate .roomstamp{animation:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <div class="mark"><span></span></div>
    <b>Cart Inventory</b>
    <span class="sep">/</span>
    <small>Device Lookup</small>
  </div>

  <div class="scanline" id="scanline">
    <span class="dot"></span>
    <span id="scantext">Loading inventory…</span>
  </div>

  <!-- dynamic content renders here -->
  <div id="result"></div>

  <div class="search">
    <div class="lbl">Look up another device</div>
    <div class="sbar">
      <input id="q" inputmode="text" autocomplete="off" spellcheck="false"
             placeholder="Asset tag, serial, or room #">
      <button id="go" type="button">Find</button>
    </div>
    <div class="hint">Try an asset tag (DOE-AC646260), part of a serial, or a room number (444) to see the whole cart.</div>
    <div class="results" id="results"></div>
  </div>

  <div class="foot">
    <span class="src" id="srcbadge"><span class="d"></span><span id="srctext">built-in snapshot</span></span>
    <span id="countbadge"></span>
    <span id="datebadge"></span>
  </div>

</div>

5","teacher":"Brown","asset":"DOE-AC646308","serial":"NXATTAA001151385DF7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646384","serial":"NXATTAA0011513847B7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646107","serial":"NXATTAA00115136D7E7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646160","serial":"NXATTAA001151384127611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646062","serial":"NXATTAA00115136D2E7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646067","serial":"NXATTAA00115136BD07611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646329","serial":"NXATTAA00115136B887611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646216","serial":"NXATTAA0011513837C7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646309","serial":"NXATTAA0011513847E7611","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-DELCTF043716","serial":"63CZFF4","type":"Chromebook"},{"room":"485","teacher":"Brown","asset":"DOE-AC646321","serial":"NXATTAA00115136B947611","type":"Chromebook"}]};

/* Name of the spreadsheet sitting next to this page. Replace that file to update the data. */
const XLSX_FILE = "Cart_Inventory.xlsx";

/* ---------- helpers ---------- */
function norm(s){
  if(s==null) return "";
  s = String(s).trim().replace(/^[*"'•°\-–\s]+|[*"'•°\-–\s]+$/g,"");
  s = s.replace(/\s*-\s*/g,"-").replace(/\s+/g,"");
  return s.toUpperCase();
}
function esc(s){return String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

let DB = {devices:[], generated:SNAPSHOT.generated};

function buildFromSnapshot(){ DB = {devices:SNAPSHOT.devices.slice(), generated:SNAPSHOT.generated}; }

/* parse the live xlsx the same way the build script does */
function parseWorkbook(wb){
  const out=[];
  wb.SheetNames.forEach(name=>{
    const m = name.match(/(\d+)\s*(.*)/);
    const room = m? m[1] : name;
    const teacher = m? (m[2]||"").trim() : "";
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[name], {header:1, blankrows:false, defval:""});
    rows.slice(1).forEach(r=>{
      if(!r || r.every(c=>c===""||c==null)) return;
      const asset = norm(r[0]);
      const serial = (r[1]!=null && String(r[1]).trim()!=="") ? String(r[1]).trim() : "";
      const type   = (r[2]!=null && String(r[2]).trim()!=="") ? String(r[2]).trim() : "";
      if(!asset && !serial) return;
      out.push({room, teacher, asset, serial, type});
    });
  });
  return out;
}

async function tryLive(){
  try{
    const res = await fetch(XLSX_FILE, {cache:"no-store"});
    if(!res.ok) throw new Error(res.status);
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, {type:"array"});
    const devices = parseWorkbook(wb);
    if(devices.length){
      DB = {devices, generated:null, live:true};
      markSource(true);
      render();           // re-render with fresh data
    }
  }catch(e){ /* keep snapshot; badge stays as snapshot */ }
}

/* ---------- lookups ---------- */
function findByAsset(id){
  const n = norm(id);
  return DB.devices.filter(d=>d.asset && d.asset===n);
}
function searchDevices(qraw){
  const n = norm(qraw);
  const q = qraw.trim().toUpperCase();
  if(!n && !q) return [];
  const hit = new Map();
  DB.devices.forEach((d,i)=>{
    const asset=d.asset, serial=norm(d.serial);
    if(asset && (asset===n || asset.includes(n))) hit.set(i,d);
    else if(serial && serial.includes(n) && n.length>=4) hit.set(i,d);
  });
  return [...hit.values()];
}
function roomList(q){
  const num = q.replace(/[^0-9]/g,"");
  const txt = q.trim().toUpperCase();
  return DB.devices.filter(d=>
    (num && d.room===num) ||
    (txt.length>=3 && d.teacher && d.teacher.toUpperCase().includes(txt))
  );
}
function roomsForAsset(asset){
  return [...new Set(findByAsset(asset).map(d=>d.room))];
}

/* ---------- render ---------- */
const $ = s=>document.querySelector(s);
const resultEl = $("#result");

function assetHTML(asset){
  return '<span class="ast">*</span>'+esc(asset)+'<span class="ast">*</span>';
}

function deviceCard(d, animate){
  const rooms = roomsForAsset(d.asset);
  const conflict = rooms.length>1;
  const html = [];

  // ROOM HERO
  if(conflict){
    html.push(`
      <div class="hero ${animate?'animate':''}">
        <div class="eyebrow">Assigned to</div>
        <div class="roomblock">
          <div class="roomstamp" style="background:var(--flag-bg);border-color:#E0B7B0;color:var(--flag);box-shadow:none">
            <div class="num" style="font-size:46px;padding-top:14px">— —</div>
            <div class="lab" style="opacity:.85">Conflict</div>
          </div>
          <div class="roommeta">
            <div class="who" style="font-size:19px">Listed in more than one room</div>
            <div class="sub">This device needs review — see below.</div>
          </div>
        </div>
      </div>`);
  } else {
    const d0 = findByAsset(d.asset)[0] || d;
    html.push(`
      <div class="hero ${animate?'animate':''}">
        <div class="eyebrow">Assigned to</div>
        <div class="roomblock">
          <div class="roomstamp">
            <div class="num">${esc(d0.room)}</div>
            <div class="lab">Room</div>
          </div>
          <div class="roommeta">
            <div class="who">${d0.teacher?esc(d0.teacher):'Room '+esc(d0.room)}</div>
            <div class="sub">${d0.teacher?'Room '+esc(d0.room):'Cart location'}</div>
          </div>
        </div>
      </div>`);
  }

  // DEVICE PANEL
  html.push(`
    <div class="panel">
      <div class="phead"><span>Device</span><span class="typepill">${d.type?esc(d.type):'Unspecified'}</span></div>
      <div class="tagzone">
        <div class="barcode" aria-hidden="true"></div>
        <div class="asset">${d.asset?assetHTML(d.asset):'<span style="color:var(--ink-soft)">No asset tag on record</span>'}</div>
        <div class="rows">
          <div class="row"><div class="k">Asset tag</div><div class="v ${d.asset?'':'empty'}">${d.asset?esc(d.asset):'— none —'}</div></div>
          <div class="row"><div class="k">Serial</div><div class="v ${d.serial?'':'empty'}">${d.serial?esc(d.serial):'— none —'}</div></div>
          <div class="row" style="border-bottom:0"><div class="k">Type</div><div class="v ${d.type?'':'empty'}">${d.type?esc(d.type):'— none —'}</div></div>
        </div>
      </div>
    </div>`);

  if(conflict){
    html.push(`
      <div class="notice flag">
        <b>Needs review.</b> This asset tag appears in ${rooms.length} rooms in the inventory.
        A device can only live in one cart — the extra entries are probably left over from when it was moved.
        <div class="rooms">${rooms.map(r=>`<span class="roomchip">Room ${esc(r)}</span>`).join("")}</div>
      </div>`);
  }
  return html.join("");
}

function notFound(scanned){
  return `
    <div class="empty">
      <div class="big">No match found</div>
      ${scanned?`<div class="scanned">scanned: ${esc(scanned)}</div>`:''}
      <p>This tag isn't in the inventory yet. Add the device to a room sheet in the spreadsheet, then it'll show up here. You can also search below.</p>
    </div>`;
}

function welcome(){
  const rooms=[...new Set(DB.devices.map(d=>d.room))].sort((a,b)=>(+a||0)-(+b||0));
  return `
    <div class="empty">
      <div class="big">Scan a device or search</div>
      <p>Tap a laptop's NFC tag to see the room it belongs to, or use the search below. Tracking ${DB.devices.length} devices across ${rooms.length} rooms.</p>
    </div>`;
}

let currentScan = null;
function render(){
  const params = new URLSearchParams(location.search);
  const id = params.get("id") || params.get("asset") || params.get("tag");
  currentScan = id;

  if(id){
    const matches = findByAsset(id);
    if(matches.length){
      $("#scantext").innerHTML = `Scanned <b>${esc(matches[0].asset)}</b>`;
      resultEl.innerHTML = deviceCard(matches[0], true);
    } else {
      $("#scantext").innerHTML = `Scanned <b>${esc(norm(id))}</b> · not on record`;
      resultEl.innerHTML = notFound(norm(id));
    }
  } else {
    $("#scantext").textContent = `Ready · ${DB.devices.length} devices loaded`;
    resultEl.innerHTML = welcome();
  }
  updateFoot();
}

function updateFoot(){
  $("#countbadge").textContent = "· "+DB.devices.length+" devices";
  $("#datebadge").textContent = DB.generated ? "· snapshot "+DB.generated : "";
}
function markSource(live){
  const b=$("#srcbadge");
  if(live){ b.classList.add("live"); $("#srctext").textContent="live from spreadsheet"; $("#datebadge").textContent=""; }
  else { b.classList.remove("live"); $("#srctext").textContent="built-in snapshot"; }
}

/* ---------- search UI ---------- */
function runSearch(){
  const q = $("#q").value.trim();
  const box = $("#results");
  if(!q){ box.innerHTML=""; return; }

  const exact = findByAsset(q);
  if(exact.length===1){ showDevice(exact[0]); box.innerHTML=""; return; }

  const rl = roomList(q);
  if(rl.length){
    const room = rl[0].room, teacher = rl[0].teacher;
    box.innerHTML = `<div class="reshead">Room ${esc(room)}${teacher?' · '+esc(teacher):''} — ${rl.length} devices</div>`
      + rl.map(d=>itemHTML(d)).join("");
  } else {
    const res = searchDevices(q);
    if(!res.length){ box.innerHTML = `<div class="reshead">No matches for “${esc(q)}”</div>`; return; }
    box.innerHTML = `<div class="reshead">${res.length} match${res.length>1?'es':''}</div>`
      + res.map(d=>itemHTML(d)).join("");
  }
  box.querySelectorAll(".item").forEach((el,i)=>{
    el.addEventListener("click",()=>{
      const arr = box._items;
      if(arr && arr[i]) showDevice(arr[i]);
    });
  });
  box._items = rl.length ? rl : (exact.length?exact:searchDevices(q));
}
function itemHTML(d){
  const conf = roomsForAsset(d.asset).length>1;
  return `<button class="item ${conf?'conf':''}" type="button">
      <span class="rm">${conf?'!':esc(d.room)}</span>
      <span class="meta"><span class="a">${d.asset?esc(d.asset):'(no asset tag)'}</span>
      <span class="s">${esc(d.type||'—')}${d.serial?' · '+esc(d.serial):''}</span></span>
    </button>`;
}
function showDevice(d){
  $("#scantext").innerHTML = `Showing <b>${esc(d.asset||d.serial)}</b>`;
  resultEl.innerHTML = deviceCard(d, true);
  $("#results").innerHTML="";
  $("#q").value="";
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ---------- boot ---------- */
buildFromSnapshot();
markSource(false);
render();
$("#go").addEventListener("click",runSearch);
$("#q").addEventListener("keydown",e=>{ if(e.key==="Enter") runSearch(); });
tryLive();   // refresh from the live spreadsheet if it's reachable
</script>
